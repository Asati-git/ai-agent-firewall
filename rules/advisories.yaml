# Cerberus — local package-advisory seed (DATA, not code). Matched by `cerberus deps` against your
# lockfiles, fully OFFLINE. Curated from documented supply-chain incidents; EXTEND for your org, or run
# `cerberus deps --osv` to additionally query OSV.dev for your resolved dependency set (opt-in, online).
#
# Fields: id, ecosystem (npm|PyPI|crates.io|Go|* for any), name, severity (malicious|critical|high|
# medium|low), summary. Affected versions: `versions:` (exact list) OR `range: {introduced, fixed}`
# (introduced <= v < fixed) OR omit both = ALL versions of that name are flagged.

advisories:
